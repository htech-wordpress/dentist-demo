name: Deploy Dentist Demo 2

on:
  push:
    branches:
      - main
    paths:
      - 'dentist-demo-2/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dentist-demo-2
    permissions:
      contents: write
    env:
      FIREBASE_PROJECT_ID: htec-wp
      FIREBASE_SITE_ID: dentist-demo-2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT secret is empty or not accessible."
            exit 1
          fi
          SERVICE_ACCOUNT_FILE="$HOME/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$SERVICE_ACCOUNT_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SERVICE_ACCOUNT_FILE" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --project "$FIREBASE_PROJECT_ID" --only "hosting:$FIREBASE_SITE_ID"
